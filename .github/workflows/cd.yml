# ============================================================================
# Feedscope — Continuous Deployment
# Builds container images, pushes to ghcr.io, and deploys to Azure App Service.
#
# Required GitHub Secrets:
#   AZURE_CREDENTIALS  — Azure service principal credentials JSON
#                        (Contributor role on rg-rewind-ea)
# ============================================================================

name: CD

on:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/${{ github.repository }}/backend
  FRONTEND_IMAGE: ghcr.io/${{ github.repository }}/frontend
  AZURE_RG: rg-rewind-ea

jobs:
  build-backend:
    name: Build Backend Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: backend
          push: true
          tags: ${{ env.BACKEND_IMAGE }}:${{ github.sha }},${{ env.BACKEND_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-frontend:
    name: Build Frontend Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: frontend
          push: true
          tags: ${{ env.FRONTEND_IMAGE }}:${{ github.sha }},${{ env.FRONTEND_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Azure App Service
    needs: [build-backend, build-frontend]
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy Backend
        run: |
          az webapp config container set \
            --name app-backend-feedscope-prod \
            --resource-group ${{ env.AZURE_RG }} \
            --container-image-name ${{ env.BACKEND_IMAGE }}:${{ github.sha }} \
            --container-registry-url https://ghcr.io

      - name: Deploy Frontend
        run: |
          az webapp config container set \
            --name app-frontend-feedscope-prod \
            --resource-group ${{ env.AZURE_RG }} \
            --container-image-name ${{ env.FRONTEND_IMAGE }}:${{ github.sha }} \
            --container-registry-url https://ghcr.io

      - name: Verify Backend Health
        run: |
          sleep 30
          curl -sf https://app-backend-feedscope-prod.azurewebsites.net/health || echo "Health check pending..."

# ============================================================================
# Feedscope — Continuous Deployment
# Builds container images, pushes to Azure Container Registry, and deploys
# to Azure Container Apps.
#
# Required GitHub Secrets:
#   ACR_LOGIN_SERVER   — ACR login server (e.g. acrfeedscope.azurecr.io)
#   ACR_USERNAME       — ACR admin username or service principal appId
#   ACR_PASSWORD       — ACR admin password or service principal password
#   AZURE_CREDENTIALS  — Azure service principal credentials JSON for az login
#                        (with Contributor role on the resource group)
#   AZURE_RG           — Azure resource group name (e.g. rg-feedscope-dev)
# ============================================================================

name: CD

on:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  ACR_LOGIN_SERVER: ${{ secrets.ACR_LOGIN_SERVER }}

jobs:
  build-backend:
    name: Build Backend Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: azure/docker-login@v2
        with:
          login-server: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}
      - uses: docker/build-push-action@v6
        with:
          context: backend
          push: true
          tags: ${{ secrets.ACR_LOGIN_SERVER }}/backend:${{ github.sha }},${{ secrets.ACR_LOGIN_SERVER }}/backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-frontend:
    name: Build Frontend Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: azure/docker-login@v2
        with:
          login-server: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}
      - uses: docker/build-push-action@v6
        with:
          context: frontend
          push: true
          tags: ${{ secrets.ACR_LOGIN_SERVER }}/frontend:${{ github.sha }},${{ secrets.ACR_LOGIN_SERVER }}/frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Azure Container Apps
    needs: [build-backend, build-frontend]
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy Backend Container App
        run: |
          az containerapp update \
            --name aca-backend-dev \
            --resource-group ${{ secrets.AZURE_RG }} \
            --image ${{ secrets.ACR_LOGIN_SERVER }}/backend:${{ github.sha }}

      - name: Deploy Frontend Container App
        run: |
          az containerapp update \
            --name aca-frontend-dev \
            --resource-group ${{ secrets.AZURE_RG }} \
            --image ${{ secrets.ACR_LOGIN_SERVER }}/frontend:${{ github.sha }}

      - name: Verify Deployments
        run: |
          echo "--- Backend ---"
          az containerapp show \
            --name aca-backend-dev \
            --resource-group ${{ secrets.AZURE_RG }} \
            --query "{status:properties.runningStatus, fqdn:properties.configuration.ingress.fqdn}" \
            --output table

          echo "--- Frontend ---"
          az containerapp show \
            --name aca-frontend-dev \
            --resource-group ${{ secrets.AZURE_RG }} \
            --query "{status:properties.runningStatus, fqdn:properties.configuration.ingress.fqdn}" \
            --output table
